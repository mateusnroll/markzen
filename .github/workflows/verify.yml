name: Verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run verify

  shell:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:shell
      - if: runner.os != 'Linux'
        run: npm run test:shell
