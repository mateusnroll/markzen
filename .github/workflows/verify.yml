name: Verify

on:
  push:
  pull_request:

jobs:
  performance:
    continue-on-error: true
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:performance
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-reports
          path: test-results/spec*-performance.json
          if-no-files-found: warn

  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run verify

  shell:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes openbox
      - if: runner.os == 'Linux'
        run: xvfb-run -a sh -c 'openbox >/tmp/openbox.log 2>&1 & exec npm run test:shell'
      - if: runner.os != 'Linux'
        run: npm run test:shell
